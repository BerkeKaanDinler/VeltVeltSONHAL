<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELT Home Themes Preview</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #080908;
      color: #f4f7f0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body { padding: 24px; }
    h1 { margin: 0 0 18px; font-size: 19px; line-height: 1.2; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 390px));
      gap: 24px;
      align-items: start;
    }
    figure { margin: 0; }
    figcaption {
      margin-bottom: 8px;
      color: #cbd4c7;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }
    img {
      width: 390px;
      height: 844px;
      max-width: 100%;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,.42);
      background: #111412;
    }
  </style>
</head>
<body>
  <h1>01 Home · 5 Theme Variants</h1>
  <div class="grid">
    <figure><figcaption>Iron Dark</figcaption><img src="exports/01-home-iron.png" alt="Home Iron Dark" /></figure>
    <figure><figcaption>Slate Mono</figcaption><img src="exports/01-home-slate.png" alt="Home Slate Mono" /></figure>
    <figure><figcaption>Rose Gold</figcaption><img src="exports/01-home-rose.png" alt="Home Rose Gold" /></figure>
    <figure><figcaption>Warm Paper</figcaption><img src="exports/01-home-warm.png" alt="Home Warm Paper" /></figure>
    <figure><figcaption>Emerald</figcaption><img src="exports/01-home-emerald.png" alt="Home Emerald" /></figure>
  </div>
</body>
</html>
