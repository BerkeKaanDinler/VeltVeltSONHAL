<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELT Home Themed</title>
  <style>
    :root {
      --ink: #0f0f0f;
      --surface: #0f0f0f;
      --elevated: #1a1a1a;
      --high: #242424;
      --divider: #2a2a2a;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #6b6b6b;
      --accent: #d97706;
      --accentSoft: #92400e;
      --success: #22c55e;
      --ctaText: #ffffff;
      --shadow: rgba(0,0,0,.26);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 390px;
      height: 844px;
      margin: 0;
      overflow: hidden;
      background: var(--surface);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body.board {
      width: auto;
      height: auto;
      min-height: 100vh;
      padding: 28px;
      overflow: auto;
      background: #080908;
    }

    html.board-html,
    html.board-html body {
      width: auto;
      height: auto;
      min-width: 2074px;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(5, 390px);
      gap: 24px;
      align-items: start;
    }

    .label-out {
      margin: 0 0 8px;
      color: #e8eee6;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .theme-iron {
      --ink: #0f0f0f;
      --surface: #0f0f0f;
      --elevated: #1a1a1a;
      --high: #242424;
      --divider: #2a2a2a;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #6b6b6b;
      --accent: #d97706;
      --accentSoft: #92400e;
      --success: #22c55e;
      --ctaText: #ffffff;
      --shadow: rgba(0,0,0,.30);
    }

    .theme-slate {
      --ink: #0a0e1a;
      --surface: #0a0e1a;
      --elevated: #141927;
      --high: #1e2434;
      --divider: #252b3d;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #94a3b8;
      --accentSoft: #475569;
      --success: #22c55e;
      --ctaText: #0a0e1a;
      --shadow: rgba(0,0,0,.30);
    }

    .theme-rose {
      --ink: #100a0e;
      --surface: #100a0e;
      --elevated: #1b131a;
      --high: #241b22;
      --divider: #2d2128;
      --text: #fbeef2;
      --text2: #b89ba8;
      --text3: #896678;
      --accent: #f472b6;
      --accentSoft: #9d174d;
      --success: #22c55e;
      --ctaText: #100a0e;
      --shadow: rgba(0,0,0,.32);
    }

    .theme-warm {
      --ink: #f2ead9;
      --surface: #f2ead9;
      --elevated: #fbf6ed;
      --high: #eae1d0;
      --divider: #d8cebc;
      --text: #1c1309;
      --text2: #5c4a38;
      --text3: #8a7865;
      --accent: #c55f18;
      --accentSoft: #e6a668;
      --success: #5a8740;
      --ctaText: #ffffff;
      --shadow: rgba(77,55,32,.13);
    }

    .theme-emerald {
      --ink: #0a1410;
      --surface: #0a1410;
      --elevated: #0f1f18;
      --high: #162b22;
      --divider: #1f352a;
      --text: #e8f5ee;
      --text2: #7bab94;
      --text3: #527a68;
      --accent: #10b981;
      --accentSoft: #065f46;
      --success: #84cc16;
      --ctaText: #06110d;
      --shadow: rgba(0,0,0,.30);
    }

    .phone {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0) 190px),
        var(--surface);
      color: var(--text);
    }

    .phone:before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .55;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.68), transparent 45%);
    }

    .theme-warm .phone:before {
      background-image:
        linear-gradient(rgba(28,19,9,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28,19,9,.032) 1px, transparent 1px);
      opacity: .7;
    }

    .status {
      position: relative;
      z-index: 2;
      height: 44px;
      padding: 12px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .sys { display: flex; align-items: center; gap: 7px; font-size: 12px; }
    .bars { height: 12px; display: flex; align-items: end; gap: 2px; }
    .bars i { width: 3px; border-radius: 2px; background: var(--text); }
    .bars i:nth-child(1) { height: 4px; opacity: .42; }
    .bars i:nth-child(2) { height: 7px; opacity: .62; }
    .bars i:nth-child(3) { height: 10px; opacity: .82; }
    .bars i:nth-child(4) { height: 12px; }
    .battery { width: 24px; height: 11px; border: 1.4px solid var(--text2); border-radius: 3px; position: relative; }
    .battery:before { content: ""; position: absolute; right: -4px; top: 3px; width: 2px; height: 5px; border-radius: 2px; background: var(--text2); }
    .battery:after { content: ""; position: absolute; left: 2px; top: 2px; bottom: 2px; width: 15px; border-radius: 2px; background: var(--success); }

    main {
      position: relative;
      z-index: 2;
      height: calc(100% - 44px - 72px);
      padding: 8px 18px 16px;
      overflow: hidden;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--text2);
      font-size: 10px;
      line-height: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1, h2, h3, p { letter-spacing: 0; }
    h1 {
      margin: 0;
      color: var(--text);
      font-size: 31px;
      line-height: 34px;
      font-weight: 900;
    }

    .logo {
      height: 38px;
      min-width: 58px;
      padding: 0 10px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 16%, var(--elevated));
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
      font-size: 15px;
      font-weight: 950;
    }

    .hero {
      min-height: 244px;
      padding: 15px;
      border-radius: 8px;
      background:
        linear-gradient(140deg, color-mix(in srgb, var(--accent) 10%, transparent), transparent 45%),
        var(--elevated);
      border: 1px solid var(--divider);
      box-shadow: 0 18px 34px var(--shadow);
      display: grid;
      align-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero:before {
      content: "";
      position: absolute;
      right: -52px;
      top: 22px;
      width: 168px;
      height: 168px;
      border-radius: 50%;
      border: 18px solid color-mix(in srgb, var(--accent) 13%, transparent);
    }

    .hero > * { position: relative; z-index: 1; }

    .pill {
      height: 26px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--high);
      color: var(--text2);
      border: 1px solid var(--divider);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.accent {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 13%, var(--elevated));
      border-color: color-mix(in srgb, var(--accent) 34%, var(--divider));
    }

    .pill.success {
      color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, var(--elevated));
      border-color: color-mix(in srgb, var(--success) 32%, var(--divider));
    }

    .hero-title {
      margin: 9px 0 0;
      max-width: 245px;
      color: var(--text);
      font-size: 34px;
      line-height: 36px;
      font-weight: 950;
    }

    .sub {
      margin: 7px 0 0;
      color: var(--text2);
      font-size: 12px;
      line-height: 17px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .metric {
      min-height: 55px;
      padding: 9px;
      border-radius: 8px;
      background: var(--high);
      border: 1px solid var(--divider);
    }

    .metric b {
      display: block;
      color: var(--text);
      font-size: 20px;
      line-height: 21px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--text3);
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 8px;
      margin-top: 12px;
    }

    .button {
      height: 47px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: var(--ctaText);
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 14px 26px color-mix(in srgb, var(--accent) 19%, transparent);
    }

    .button.secondary {
      background: var(--high);
      color: var(--text);
      border: 1px solid var(--divider);
      box-shadow: none;
    }

    .section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0 8px;
    }

    .section span:first-child {
      color: var(--text2);
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
    }

    .panel {
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--divider);
      box-shadow: 0 15px 28px var(--shadow);
    }

    .readiness {
      min-height: 126px;
      padding: 12px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
    }

    .ring {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, var(--elevated) 0 50%, transparent 51%),
        conic-gradient(var(--accent) 0 82%, var(--high) 82% 100%);
      color: var(--text);
      font-size: 22px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .tiny {
      margin: 0;
      color: var(--text3);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .load {
      min-height: 126px;
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .row b { color: var(--text); font-size: 14px; font-weight: 900; font-variant-numeric: tabular-nums; }
    .bar {
      height: 7px;
      border-radius: 999px;
      background: var(--high);
      overflow: hidden;
      margin-top: 5px;
    }
    .bar i { display: block; height: 100%; border-radius: inherit; background: var(--accent); }

    .session {
      min-height: 86px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .session h2 {
      margin: 4px 0 0;
      color: var(--text);
      font-size: 17px;
      line-height: 21px;
      font-weight: 950;
    }

    .meta {
      display: flex;
      gap: 8px;
      margin-top: 7px;
      color: var(--text2);
      font-size: 11px;
      font-weight: 800;
    }

    .badge {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--accent) 15%, var(--high));
      color: var(--accent);
      font-size: 13px;
      font-weight: 950;
    }

    .nav {
      position: absolute;
      z-index: 3;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: var(--surface);
      border-top: 1px solid var(--divider);
    }

    .nav-item {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 5px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 800;
    }

    .nav-icon {
      width: 25px;
      height: 25px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--high);
      color: var(--text3);
      font-size: 11px;
      font-weight: 950;
    }

    .nav-item.active { color: var(--text); }
    .nav-item.active .nav-icon {
      background: var(--accent);
      color: var(--ctaText);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const themes = {
      iron: "Iron Dark",
      slate: "Slate Mono",
      rose: "Rose Gold",
      warm: "Warm Paper",
      emerald: "Emerald"
    };

    function screen(theme) {
      return `
        <div class="phone theme-${theme}">
          <div class="status">
            <div>9:41</div>
            <div class="sys"><span class="bars"><i></i><i></i><i></i><i></i></span><span>5G</span><span class="battery"></span></div>
          </div>
          <main>
            <header class="top">
              <div>
                <p class="eyebrow">Wednesday, May 20</p>
                <h1>Home</h1>
              </div>
              <div class="logo">VELT</div>
            </header>

            <section class="hero">
              <div>
                <span class="pill accent">Today's plan</span>
                <h2 class="hero-title">Push A is ready.</h2>
                <p class="sub">Chest, shoulders and triceps. A focused session with one clear progression target.</p>
              </div>
              <div>
                <div class="metrics">
                  <div class="metric"><b>7</b><span>Exercises</span></div>
                  <div class="metric"><b>64</b><span>Minutes</span></div>
                  <div class="metric"><b>+2.5</b><span>kg target</span></div>
                </div>
                <div class="actions">
                  <div class="button">Start Workout</div>
                  <div class="button secondary">Edit</div>
                </div>
              </div>
            </section>

            <div class="section"><span>Readiness</span><span class="pill success">Good load</span></div>
            <section class="grid">
              <div class="panel readiness">
                <div class="ring">82</div>
                <p class="tiny">Score</p>
              </div>
              <div class="panel load">
                <div>
                  <div class="row"><p class="tiny">Sleep</p><b>7h 40m</b></div>
                  <div class="bar"><i style="width:78%"></i></div>
                </div>
                <div>
                  <div class="row"><p class="tiny">Weekly load</p><b>68%</b></div>
                  <div class="bar"><i style="width:68%"></i></div>
                </div>
                <div>
                  <div class="row"><p class="tiny">Consistency</p><b>5 / 7</b></div>
                  <div class="bar"><i style="width:71%"></i></div>
                </div>
              </div>
            </section>

            <div class="section"><span>Last workout</span><span class="pill">View</span></div>
            <section class="panel session">
              <div>
                <p class="tiny">Pull B · Monday</p>
                <h2>5,120 kg volume</h2>
                <div class="meta"><span>58 min</span><span>21 sets</span><span>Back focus</span></div>
              </div>
              <div class="badge">PR</div>
            </section>
          </main>
          <nav class="nav">
            <div class="nav-item active"><div class="nav-icon">H</div><span>Home</span></div>
            <div class="nav-item"><div class="nav-icon">T</div><span>Train</span></div>
            <div class="nav-item"><div class="nav-icon">N</div><span>Food</span></div>
            <div class="nav-item"><div class="nav-icon">P</div><span>Stats</span></div>
            <div class="nav-item"><div class="nav-icon">U</div><span>You</span></div>
          </nav>
        </div>`;
    }

    const params = new URLSearchParams(location.search);
    const theme = params.get("theme");
    const root = document.getElementById("root");

    if (theme) {
      document.documentElement.className = "";
      document.body.className = "";
      root.innerHTML = screen(theme);
    } else {
      document.documentElement.className = "board-html";
      document.body.className = "board";
      root.innerHTML = `<div class="board-grid">${Object.entries(themes).map(([key, name]) => `<div><div class="label-out">${name}</div>${screen(key)}</div>`).join("")}</div>`;
    }
  </script>
</body>
</html>
