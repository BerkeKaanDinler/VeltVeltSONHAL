<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELT Train Themed</title>
  <style>
    :root {
      --ink: #0f0f0f;
      --surface: #0f0f0f;
      --elevated: #1a1a1a;
      --high: #242424;
      --divider: #2a2a2a;
      --text: #ffffff;
      --text2: #a0a0a0;
      --text3: #6b6b6b;
      --accent: #d97706;
      --accentSoft: #92400e;
      --success: #22c55e;
      --ctaText: #ffffff;
      --shadow: rgba(0,0,0,.26);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 390px;
      height: 844px;
      margin: 0;
      overflow: hidden;
      background: var(--surface);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body.board {
      width: auto;
      height: auto;
      min-height: 100vh;
      padding: 28px;
      overflow: auto;
      background: #080908;
    }

    html.board-html,
    html.board-html body {
      width: auto;
      height: auto;
      min-width: 2074px;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(5, 390px);
      gap: 24px;
      align-items: start;
    }

    .label-out {
      margin: 0 0 8px;
      color: #e8eee6;
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .theme-iron {
      --ink: #0f0f0f; --surface: #0f0f0f; --elevated: #1a1a1a; --high: #242424; --divider: #2a2a2a;
      --text: #ffffff; --text2: #a0a0a0; --text3: #6b6b6b; --accent: #d97706; --accentSoft: #92400e;
      --success: #22c55e; --ctaText: #ffffff; --shadow: rgba(0,0,0,.30);
    }

    .theme-slate {
      --ink: #0a0e1a; --surface: #0a0e1a; --elevated: #141927; --high: #1e2434; --divider: #252b3d;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b; --accent: #94a3b8; --accentSoft: #475569;
      --success: #22c55e; --ctaText: #0a0e1a; --shadow: rgba(0,0,0,.30);
    }

    .theme-rose {
      --ink: #100a0e; --surface: #100a0e; --elevated: #1b131a; --high: #241b22; --divider: #2d2128;
      --text: #fbeef2; --text2: #b89ba8; --text3: #896678; --accent: #f472b6; --accentSoft: #9d174d;
      --success: #22c55e; --ctaText: #100a0e; --shadow: rgba(0,0,0,.32);
    }

    .theme-warm {
      --ink: #f2ead9; --surface: #f2ead9; --elevated: #fbf6ed; --high: #eae1d0; --divider: #d8cebc;
      --text: #1c1309; --text2: #5c4a38; --text3: #8a7865; --accent: #c55f18; --accentSoft: #e6a668;
      --success: #5a8740; --ctaText: #ffffff; --shadow: rgba(77,55,32,.13);
    }

    .theme-emerald {
      --ink: #0a1410; --surface: #0a1410; --elevated: #0f1f18; --high: #162b22; --divider: #1f352a;
      --text: #e8f5ee; --text2: #7bab94; --text3: #527a68; --accent: #10b981; --accentSoft: #065f46;
      --success: #84cc16; --ctaText: #06110d; --shadow: rgba(0,0,0,.30);
    }

    .phone {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0) 190px),
        var(--surface);
      color: var(--text);
    }

    .phone:before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .55;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.68), transparent 45%);
    }

    .theme-warm .phone:before {
      background-image:
        linear-gradient(rgba(28,19,9,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28,19,9,.032) 1px, transparent 1px);
      opacity: .7;
    }

    .status {
      position: relative;
      z-index: 2;
      height: 44px;
      padding: 12px 22px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .sys { display: flex; align-items: center; gap: 7px; font-size: 12px; }
    .bars { height: 12px; display: flex; align-items: end; gap: 2px; }
    .bars i { width: 3px; border-radius: 2px; background: var(--text); }
    .bars i:nth-child(1) { height: 4px; opacity: .42; }
    .bars i:nth-child(2) { height: 7px; opacity: .62; }
    .bars i:nth-child(3) { height: 10px; opacity: .82; }
    .bars i:nth-child(4) { height: 12px; }
    .battery { width: 24px; height: 11px; border: 1.4px solid var(--text2); border-radius: 3px; position: relative; }
    .battery:before { content: ""; position: absolute; right: -4px; top: 3px; width: 2px; height: 5px; border-radius: 2px; background: var(--text2); }
    .battery:after { content: ""; position: absolute; left: 2px; top: 2px; bottom: 2px; width: 15px; border-radius: 2px; background: var(--success); }

    main {
      position: relative;
      z-index: 2;
      height: calc(100% - 44px - 72px);
      padding: 8px 18px 16px;
      overflow: hidden;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--text2);
      font-size: 10px;
      line-height: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1, h2, h3, p { letter-spacing: 0; }
    h1 {
      margin: 0;
      color: var(--text);
      font-size: 31px;
      line-height: 34px;
      font-weight: 900;
    }

    .add {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--elevated);
      color: var(--text);
      border: 1px solid var(--divider);
      font-size: 20px;
      font-weight: 900;
    }

    .segment {
      height: 36px;
      padding: 3px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--divider);
      margin-bottom: 10px;
    }

    .segment span {
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: var(--text2);
      font-size: 11px;
      font-weight: 900;
    }

    .segment .active {
      background: var(--accent);
      color: var(--ctaText);
    }

    .hero {
      min-height: 222px;
      padding: 15px;
      border-radius: 8px;
      background:
        linear-gradient(140deg, color-mix(in srgb, var(--accent) 11%, transparent), transparent 48%),
        var(--elevated);
      border: 1px solid var(--divider);
      box-shadow: 0 18px 34px var(--shadow);
      display: grid;
      align-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero:before {
      content: "";
      position: absolute;
      right: -40px;
      top: 26px;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 17px solid color-mix(in srgb, var(--accent) 13%, transparent);
    }

    .hero > * { position: relative; z-index: 1; }

    .pill {
      height: 26px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--high);
      color: var(--text2);
      border: 1px solid var(--divider);
      font-size: 10px;
      font-weight: 900;
      white-space: nowrap;
    }

    .pill.accent {
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 13%, var(--elevated));
      border-color: color-mix(in srgb, var(--accent) 34%, var(--divider));
    }

    .pill.success {
      color: var(--success);
      background: color-mix(in srgb, var(--success) 12%, var(--elevated));
      border-color: color-mix(in srgb, var(--success) 32%, var(--divider));
    }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }

    .hero-title {
      margin: 9px 0 0;
      max-width: 248px;
      color: var(--text);
      font-size: 32px;
      line-height: 34px;
      font-weight: 950;
    }

    .sub {
      margin: 7px 0 0;
      color: var(--text2);
      font-size: 12px;
      line-height: 17px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .metric {
      min-height: 52px;
      padding: 8px 9px;
      border-radius: 8px;
      background: var(--high);
      border: 1px solid var(--divider);
    }

    .metric b {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 20px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--text3);
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 72px;
      gap: 8px;
      margin-top: 10px;
    }

    .button {
      height: 45px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: var(--ctaText);
      font-size: 13px;
      font-weight: 950;
      box-shadow: 0 14px 26px color-mix(in srgb, var(--accent) 19%, transparent);
    }

    .button.secondary {
      background: var(--high);
      color: var(--text);
      border: 1px solid var(--divider);
      box-shadow: none;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .quick-card {
      min-height: 69px;
      padding: 9px;
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--divider);
      display: grid;
      align-content: space-between;
      box-shadow: 0 10px 22px var(--shadow);
    }

    .quick-card i {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: color-mix(in srgb, var(--accent) 13%, var(--high));
      color: var(--accent);
      font-style: normal;
      font-size: 12px;
      font-weight: 950;
    }

    .quick-card b {
      display: block;
      color: var(--text);
      font-size: 11px;
      line-height: 13px;
      font-weight: 900;
    }

    .section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0 8px;
    }

    .section span:first-child {
      color: var(--text2);
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .stack { display: grid; gap: 8px; }

    .routine {
      min-height: 64px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--elevated);
      border: 1px solid var(--divider);
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 10px;
      align-items: center;
      box-shadow: 0 10px 22px var(--shadow);
    }

    .routine-icon {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 13%, var(--high));
      color: var(--accent);
      font-size: 14px;
      font-weight: 950;
    }

    .routine h2 {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 20px;
      font-weight: 950;
    }

    .routine p {
      margin: 3px 0 0;
      color: var(--text2);
      font-size: 12px;
      line-height: 15px;
    }

    .nav {
      position: absolute;
      z-index: 3;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: var(--surface);
      border-top: 1px solid var(--divider);
    }

    .nav-item {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 5px;
      color: var(--text3);
      font-size: 10px;
      font-weight: 800;
    }

    .nav-icon {
      width: 25px;
      height: 25px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--high);
      color: var(--text3);
      font-size: 11px;
      font-weight: 950;
    }

    .nav-item.active { color: var(--text); }
    .nav-item.active .nav-icon {
      background: var(--accent);
      color: var(--ctaText);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const themes = {
      iron: "Iron Dark",
      slate: "Slate Mono",
      rose: "Rose Gold",
      warm: "Warm Paper",
      emerald: "Emerald"
    };

    function screen(theme) {
      return `
        <div class="phone theme-${theme}">
          <div class="status">
            <div>9:41</div>
            <div class="sys"><span class="bars"><i></i><i></i><i></i><i></i></span><span>5G</span><span class="battery"></span></div>
          </div>
          <main>
            <header class="top">
              <div>
                <p class="eyebrow">Workout hub</p>
                <h1>Train</h1>
              </div>
              <div class="add">+</div>
            </header>

            <div class="segment">
              <span class="active">Today</span>
              <span>Routines</span>
              <span>Library</span>
            </div>

            <section class="hero">
              <div>
                <div class="row">
                  <span class="pill accent">Next workout</span>
                  <span class="pill success">Ready</span>
                </div>
                <h2 class="hero-title">Push A is queued.</h2>
                <p class="sub">Bench, incline press, shoulders and triceps. Start fast or tune the plan first.</p>
              </div>
              <div>
                <div class="metrics">
                  <div class="metric"><b>7</b><span>Exercises</span></div>
                  <div class="metric"><b>28</b><span>Sets</span></div>
                  <div class="metric"><b>64</b><span>Minutes</span></div>
                </div>
                <div class="actions">
                  <div class="button">Start Push A</div>
                  <div class="button secondary">Edit</div>
                </div>
              </div>
            </section>

            <div class="quick">
              <div class="quick-card"><i>+</i><b>Empty workout</b></div>
              <div class="quick-card"><i>B</i><b>Build routine</b></div>
              <div class="quick-card"><i>L</i><b>Find program</b></div>
            </div>

            <div class="section">
              <span>Your routines</span>
              <span class="pill">View all</span>
            </div>

            <section class="stack">
              <div class="routine">
                <div class="routine-icon">P</div>
                <div><h2>Push A</h2><p>Today · chest focus</p></div>
                <span class="pill accent">Start</span>
              </div>
              <div class="routine">
                <div class="routine-icon">L</div>
                <div><h2>Legs</h2><p>Tomorrow · 8 exercises</p></div>
                <span class="pill">Plan</span>
              </div>
            </section>
          </main>
          <nav class="nav">
            <div class="nav-item"><div class="nav-icon">H</div><span>Home</span></div>
            <div class="nav-item active"><div class="nav-icon">T</div><span>Train</span></div>
            <div class="nav-item"><div class="nav-icon">N</div><span>Food</span></div>
            <div class="nav-item"><div class="nav-icon">P</div><span>Stats</span></div>
            <div class="nav-item"><div class="nav-icon">U</div><span>You</span></div>
          </nav>
        </div>`;
    }

    const params = new URLSearchParams(location.search);
    const theme = params.get("theme");
    const root = document.getElementById("root");

    if (theme) {
      document.documentElement.className = "";
      document.body.className = "";
      root.innerHTML = screen(theme);
    } else {
      document.documentElement.className = "board-html";
      document.body.className = "board";
      root.innerHTML = `<div class="board-grid">${Object.entries(themes).map(([key, name]) => `<div><div class="label-out">${name}</div>${screen(key)}</div>`).join("")}</div>`;
    }
  </script>
</body>
</html>
