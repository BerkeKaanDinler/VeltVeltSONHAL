<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELT Redesign Screens</title>
  <style>
    :root {
      --bg: #080a09;
      --bg2: #0e1110;
      --panel: #151917;
      --panel2: #1d221f;
      --panel3: #242a26;
      --line: #30362f;
      --line2: #465044;
      --text: #f5f7f1;
      --muted: #a1ab9d;
      --faint: #657065;
      --copper: #f08a24;
      --lime: #b7e64b;
      --cyan: #48d6f6;
      --violet: #9d8cff;
      --rose: #ff5c7a;
      --white: #ffffff;
      --shadow: rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }
    html, body {
      width: 390px;
      height: 844px;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body.board {
      width: auto;
      height: auto;
      min-height: 100vh;
      overflow: auto;
      padding: 28px;
      background: #060706;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(3, 390px);
      gap: 28px;
      align-items: start;
    }

    .app {
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0) 160px),
        linear-gradient(180deg, var(--bg2), var(--bg) 58%, #050605);
      color: var(--text);
    }

    .app:before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.72), transparent 48%);
    }

    .status {
      position: relative;
      z-index: 2;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text);
      font-size: 12px;
    }

    .bars { display: flex; gap: 2px; align-items: flex-end; height: 12px; }
    .bars i { width: 3px; background: var(--text); border-radius: 2px; display: block; }
    .bars i:nth-child(1) { height: 4px; opacity: .45; }
    .bars i:nth-child(2) { height: 7px; opacity: .65; }
    .bars i:nth-child(3) { height: 10px; opacity: .85; }
    .bars i:nth-child(4) { height: 12px; }
    .battery { width: 24px; height: 11px; border: 1.5px solid rgba(245,247,241,.75); border-radius: 3px; position: relative; }
    .battery:before { content: ""; position: absolute; right: -4px; top: 3px; width: 2px; height: 5px; border-radius: 2px; background: rgba(245,247,241,.75); }
    .battery:after { content: ""; position: absolute; left: 2px; top: 2px; bottom: 2px; width: 16px; border-radius: 2px; background: var(--lime); }

    .topbar {
      position: relative;
      z-index: 2;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
    }

    .back, .round {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 8px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .top-title { flex: 1; min-width: 0; }
    .top-title h1 { margin: 0; font-size: 19px; line-height: 22px; letter-spacing: 0; }
    .top-title p { margin: 3px 0 0; color: var(--muted); font-size: 11px; }

    .main {
      position: relative;
      z-index: 2;
      height: calc(100% - 44px - 72px);
      padding: 6px 18px 14px;
      overflow: hidden;
    }

    .main.no-nav { height: calc(100% - 44px); padding-bottom: 18px; }
    .main.with-topbar { height: calc(100% - 44px - 58px); }
    .scroll { height: 100%; overflow: hidden; }

    .nav {
      position: absolute;
      z-index: 4;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 1px solid rgba(255,255,255,.075);
      background: rgba(10, 12, 11, .94);
      box-shadow: 0 -18px 30px rgba(0,0,0,.22);
    }

    .nav div {
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      color: var(--faint);
      font-size: 10px;
      font-weight: 700;
    }

    .nav .active { color: var(--text); }
    .nav .active .nav-ico { background: var(--copper); color: #160d05; }
    .nav-ico {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    h1, h2, h3, p { letter-spacing: 0; }
    .brand h1, .hero-title {
      margin: 0;
      font-size: 31px;
      line-height: 34px;
      font-weight: 850;
    }

    .wordmark {
      padding: 8px 10px;
      min-width: 64px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(240,138,36,.35);
      background: rgba(240,138,36,.11);
      color: var(--copper);
      font-size: 17px;
      font-weight: 900;
      border-radius: 8px;
    }

    .row { display: flex; align-items: center; }
    .between { justify-content: space-between; }
    .gap8 { gap: 8px; }
    .gap10 { gap: 10px; }
    .gap12 { gap: 12px; }
    .stack { display: grid; gap: 12px; }
    .stack8 { display: grid; gap: 8px; }
    .stack10 { display: grid; gap: 10px; }
    .mt8 { margin-top: 8px; }
    .mt10 { margin-top: 10px; }
    .mt12 { margin-top: 12px; }
    .mt14 { margin-top: 14px; }
    .mt16 { margin-top: 16px; }

    .panel, .card {
      border: 1px solid rgba(255,255,255,.075);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0)),
        var(--panel);
      box-shadow: 0 14px 28px var(--shadow);
    }

    .panel { padding: 14px; }
    .card { padding: 12px; }
    .flat { box-shadow: none; }
    .hair { border-color: rgba(255,255,255,.105); }

    .metric {
      min-width: 0;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.06);
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 24px;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .label {
      color: var(--faint);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .sub { color: var(--muted); font-size: 12px; line-height: 17px; }
    .tiny { color: var(--faint); font-size: 10px; line-height: 13px; font-weight: 700; }
    .title { font-size: 17px; line-height: 21px; font-weight: 820; margin: 0; }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

    .pill {
      height: 26px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.075);
      background: rgba(255,255,255,.055);
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.hot { background: rgba(240,138,36,.16); color: var(--copper); border-color: rgba(240,138,36,.34); }
    .pill.good { background: rgba(183,230,75,.12); color: var(--lime); border-color: rgba(183,230,75,.3); }
    .pill.blue { background: rgba(72,214,246,.11); color: var(--cyan); border-color: rgba(72,214,246,.28); }
    .pill.rose { background: rgba(255,92,122,.12); color: var(--rose); border-color: rgba(255,92,122,.28); }

    .button {
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--copper);
      color: #160d05;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 16px 28px rgba(240,138,36,.18);
    }

    .button.secondary {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: none;
    }

    .button.lime { background: var(--lime); color: #101408; box-shadow: 0 16px 28px rgba(183,230,75,.15); }
    .icon-chip {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: rgba(255,255,255,.07);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .left-bar { position: relative; overflow: hidden; }
    .left-bar:before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--copper);
    }

    .divider { height: 1px; background: rgba(255,255,255,.075); }

    .mini-bars { height: 42px; display: flex; align-items: end; gap: 5px; }
    .mini-bars i { flex: 1; border-radius: 3px 3px 0 0; background: rgba(255,255,255,.08); }
    .mini-bars i.hot { background: var(--copper); }
    .mini-bars i.good { background: var(--lime); }
    .mini-bars i.blue { background: var(--cyan); }

    .chart {
      height: 132px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.07);
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,.055) 0 1px, transparent 1px 31px),
        rgba(255,255,255,.025);
      position: relative;
      overflow: hidden;
    }

    .chart-line {
      position: absolute;
      inset: 16px 10px 18px;
    }

    .chart-line svg { width: 100%; height: 100%; overflow: visible; }

    .progress-line {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
    }
    .progress-line b { display: block; height: 100%; border-radius: inherit; background: var(--copper); }
    .progress-line.lime b { background: var(--lime); }
    .progress-line.cyan b { background: var(--cyan); }
    .progress-line.rose b { background: var(--rose); }

    .table { display: grid; gap: 6px; }
    .thead, .trow {
      display: grid;
      grid-template-columns: 34px 1fr 70px 52px 30px;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      color: var(--faint);
      font-weight: 850;
      text-transform: uppercase;
    }
    .trow {
      min-height: 38px;
      padding: 0 7px;
      border-radius: 7px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      text-transform: none;
      font-size: 12px;
      font-weight: 760;
    }
    .check {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      background: rgba(183,230,75,.13);
      color: var(--lime);
      font-weight: 900;
    }

    .screen-note {
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: rgba(245,247,241,.28);
      font-size: 9px;
      font-weight: 800;
      z-index: 8;
      pointer-events: none;
      display: none;
    }

    .ring {
      width: 154px;
      height: 154px;
      position: relative;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .ring strong { font-size: 31px; line-height: 33px; font-weight: 900; }
    .ring span { margin-top: 4px; color: var(--muted); font-size: 10px; font-weight: 800; text-transform: uppercase; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid2.comfy { grid-template-columns: 1.08fr .92fr; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .timeline { position: relative; padding-left: 14px; display: grid; gap: 10px; }
    .timeline:before { content: ""; position: absolute; left: 3px; top: 9px; bottom: 10px; width: 1px; background: rgba(255,255,255,.11); }
    .timeline .dot { position: absolute; left: -16px; top: 14px; width: 9px; height: 9px; border-radius: 50%; background: var(--copper); box-shadow: 0 0 0 4px rgba(240,138,36,.13); }

    .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .swatch { height: 46px; border-radius: 8px; border: 1px solid rgba(255,255,255,.09); position: relative; overflow: hidden; background: var(--panel2); }
    .swatch:after { content: ""; position: absolute; right: 7px; bottom: 7px; width: 13px; height: 13px; border-radius: 50%; background: var(--copper); }
    .swatch:nth-child(2):after { background: var(--cyan); }
    .swatch:nth-child(3):after { background: var(--lime); }
    .swatch:nth-child(4):after { background: var(--violet); }
    .swatch:nth-child(5):after { background: var(--rose); }
    .swatch.active { border-color: var(--copper); box-shadow: 0 0 0 2px rgba(240,138,36,.17); }

    .kbd {
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 7px;
      background: rgba(255,255,255,.055);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(255,255,255,.075);
    }

    .board-label {
      width: 390px;
      margin: 0 0 8px;
      color: #dbe3d5;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .train-v2-hero {
      padding: 16px;
      min-height: 194px;
      display: grid;
      align-content: space-between;
      border-radius: 10px;
      border: 1px solid rgba(240,138,36,.26);
      background:
        radial-gradient(circle at 88% 20%, rgba(183,230,75,.16), transparent 30%),
        linear-gradient(140deg, rgba(240,138,36,.18), rgba(21,25,23,.96) 44%, rgba(10,12,11,.98));
      box-shadow: 0 20px 36px rgba(0,0,0,.38);
      overflow: hidden;
      position: relative;
    }

    .train-v2-hero:after {
      content: "";
      position: absolute;
      right: -44px;
      top: 38px;
      width: 164px;
      height: 164px;
      border: 18px solid rgba(245,247,241,.05);
      border-radius: 50%;
    }

    .train-v2-hero > * { position: relative; z-index: 1; }

    .train-v2-title {
      margin: 6px 0 0;
      max-width: 246px;
      font-size: 33px;
      line-height: 35px;
      font-weight: 900;
    }

    .hero-meta-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .hero-meta-grid div {
      min-height: 50px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.07);
    }

    .hero-meta-grid b {
      display: block;
      font-size: 17px;
      line-height: 19px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .hero-meta-grid span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .quick-tile {
      min-height: 64px;
      padding: 10px 8px;
      border-radius: 9px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.075);
      display: grid;
      align-content: space-between;
    }

    .quick-tile i {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(240,138,36,.15);
      color: var(--copper);
      font-style: normal;
      font-weight: 900;
    }

    .quick-tile b {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      line-height: 13px;
      font-weight: 900;
    }

    .routine-v2 {
      min-height: 64px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(255,255,255,.075);
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .routine-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: rgba(240,138,36,.14);
      color: var(--copper);
      font-size: 16px;
      font-weight: 900;
    }

    .routine-v2:nth-child(2) .routine-icon {
      color: var(--cyan);
      background: rgba(72,214,246,.12);
    }

    .routine-v2:nth-child(3) .routine-icon {
      color: var(--lime);
      background: rgba(183,230,75,.12);
    }

    .segment {
      height: 36px;
      padding: 3px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      border-radius: 9px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.07);
    }

    .segment span {
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .segment .active {
      background: var(--text);
      color: #090b0a;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const screens = [
      ["onboarding", "Onboarding"],
      ["home", "Home"],
      ["train", "Train"],
      ["program-detail", "Program Detail"],
      ["routine-editor", "Routine Editor"],
      ["active-workout", "Active Workout"],
      ["workout-summary", "Workout Summary"],
      ["nutrition", "Nutrition"],
      ["progress", "Progress"],
      ["workout-history", "Workout History"],
      ["workout-detail", "Workout Detail"],
      ["exercise-detail", "Exercise Detail"],
      ["pr-detail", "PR Detail"],
      ["profile", "Profile"],
      ["pro", "VELT Pro"]
    ];

    const nav = (active) => `
      <div class="nav">
        ${[
          ["home","H","Home"],
          ["train","T","Train"],
          ["nutrition","N","Food"],
          ["progress","P","Stats"],
          ["profile","U","You"]
        ].map(n => `<div class="${n[0] === active ? "active" : ""}"><span class="nav-ico">${n[1]}</span><span>${n[2]}</span></div>`).join("")}
      </div>`;

    const status = () => `
      <div class="status">
        <div>9:41</div>
        <div class="signal"><span class="bars"><i></i><i></i><i></i><i></i></span><span>5G</span><span class="battery"></span></div>
      </div>`;

    const shell = (active, body, id) => `
      <div class="app">
        ${status()}
        <main class="main"><div class="scroll">${body}</div></main>
        ${nav(active)}
        <div class="screen-note">${id}</div>
      </div>`;

    const subShell = (title, subtitle, body, id, action = "...") => `
      <div class="app">
        ${status()}
        <div class="topbar">
          <div class="back">&lt;</div>
          <div class="top-title"><h1>${title}</h1>${subtitle ? `<p>${subtitle}</p>` : ""}</div>
          <div class="round">${action}</div>
        </div>
        <main class="main no-nav with-topbar"><div class="scroll">${body}</div></main>
        <div class="screen-note">${id}</div>
      </div>`;

    const fullShell = (body, id) => `
      <div class="app">
        ${status()}
        <main class="main no-nav"><div class="scroll">${body}</div></main>
        <div class="screen-note">${id}</div>
      </div>`;

    const section = (label, right = "") => `<div class="row between mt14"><div class="label">${label}</div>${right}</div>`;
    const stat = (value, label, cls = "") => `<div class="metric ${cls}"><strong>${value}</strong><span>${label}</span></div>`;
    const lineChart = (stroke = "var(--copper)") => `
      <div class="chart">
        <div class="chart-line">
          <svg viewBox="0 0 300 96" preserveAspectRatio="none">
            <path d="M0 72 C38 68, 44 42, 78 48 S132 88, 166 52 S225 20, 300 28" fill="none" stroke="${stroke}" stroke-width="5" stroke-linecap="round"/>
            <path d="M0 72 C38 68, 44 42, 78 48 S132 88, 166 52 S225 20, 300 28 L300 96 L0 96 Z" fill="${stroke}" opacity=".08"/>
          </svg>
        </div>
      </div>`;

    const rowCard = (title, meta, right = "", color = "var(--copper)") => `
      <div class="card flat row between gap10" style="border-left:4px solid ${color}">
        <div style="min-width:0">
          <p class="title">${title}</p>
          <p class="sub" style="margin:3px 0 0">${meta}</p>
        </div>
        ${right}
      </div>`;

    const tableRows = () => `
      <div class="table">

        ${section("Plans")}
        <div class="grid2">
          <div class="panel"><p class="label">Monthly</p><p class="title mt8">$4.99</p><p class="sub">Cancel anytime</p></div>
          <div class="panel hair" style="border-color:rgba(240,138,36,.35)"><p class="label" style="color:var(--copper)">Yearly</p><p class="title mt8">$29.99</p><p class="sub">Best value</p></div>
        </div>
        <div class="button mt12">Start Pro</div>
        <div class="button secondary mt8">Restore Purchase</div>
      `, "pro", "x")
    };

    function renderOne(id) {
      const fn = templates[id] || templates.home;
      return fn();
    }

    const params = new URLSearchParams(location.search);
    const id = params.get("screen");
    const root = document.getElementById("root");

    if (id) {
      document.body.className = "";
      root.innerHTML = renderOne(id);
    } else {
      document.body.className = "board";
      root.innerHTML = `<div class="board-grid">${screens.map(([sid, label]) => `<div><div class="board-label">${label}</div>${renderOne(sid)}</div>`).join("")}</div>`;
    }
  </script>
</body>
</html>
