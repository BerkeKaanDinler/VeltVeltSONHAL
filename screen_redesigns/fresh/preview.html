<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VELT Fresh Preview</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #080a09;
      color: #fffaf0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 28px;
    }
    main {
      display: grid;
      gap: 14px;
      justify-items: center;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    img {
      width: 390px;
      height: 844px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 86px);
      object-fit: contain;
      border-radius: 18px;
      background: #111412;
      box-shadow: 0 24px 70px rgba(0,0,0,.45);
    }
  </style>
</head>
<body>
  <main>
    <h1>01 · Home</h1>
    <img src="exports/01-home.png" alt="VELT fresh home redesign" />
  </main>
</body>
</html>
