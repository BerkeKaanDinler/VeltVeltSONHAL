name: velt
description: VELT — Premium offline iOS fitness tracker

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  confetti: ^0.7.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  flutter_timezone: ^5.0.0
  health: ^12.0.0
  # ── Sprint 1 cloud + payments ────────────────────────────
  sentry_flutter: ^8.9.0
  supabase_flutter: ^2.5.6
  purchases_flutter: ^8.2.0
  app_tracking_transparency: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0F0F0F"
  image: "assets/icon.png"
  android_12:
    color: "#0F0F0F"
    image: "assets/icon.png"
    icon_background_color: "#0F0F0F"
  ios: true
  android: true
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
