<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VELT — Fitness Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080B10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Hide scrollbars but keep scrolling */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* Phone wrapper — centers the iOS frame */
    #phone-root {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Override ios-frame inner screen bg */
    .ios-screen-content {
      background: #11161F !important;
    }
  </style>
</head>
<body>

  <div id="phone-root"></div>

  <!-- 1. Design tokens (plain JS) -->
  <script src="velt/tokens.js"></script>

  <!-- 2. iOS frame -->
  <script type="text/babel" src="ios-frame.jsx"></script>

  <!-- 3. Shared components -->
  <script type="text/babel" src="velt/components.jsx"></script>

  <!-- 4. Screens -->
  <script type="text/babel" src="velt/home.jsx"></script>
  <script type="text/babel" src="velt/workout.jsx"></script>
  <script type="text/babel" src="velt/train.jsx"></script>
  <script type="text/babel" src="velt/progress.jsx"></script>
  <script type="text/babel" src="velt/nutrition.jsx"></script>
  <script type="text/babel" src="velt/profile.jsx"></script>

  <!-- 5. App shell -->
  <script type="text/babel" src="velt/app.jsx"></script>

  <!-- 6. Mount -->
  <script type="text/babel">
    function Root() {
      return (
        <IOSDevice dark={true} width={390} height={844}>
          <VeltApp />
        </IOSDevice>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('phone-root'));
    root.render(<Root />);
  </script>

</body>
</html>
